# Experiments 3: Hop-Distance-Weighted Label Propagation (RF-GCN)
# Semi-supervised node classification — label-scarce setting.
#
# Paper framing:
#   VanillaGCN is limited to its L-hop receptive field (L = num_layers).
#   With scarce labels, most unlabeled nodes receive no supervision.
#   RF-GCN propagates labels from training nodes to their [min_hop, max_hop]
#   neighborhood — beyond GCN's own aggregation radius — as an auxiliary loss.

data_root: data        # relative to repo root; resolved by run_experiment.py
output_dir: outputs    # relative to repo root; resolved by run_experiment.py

# Paper datasets — the four included in Table 1.
datasets:
  - Actor
  - Minesweeper
  - PubMed
  - Tolokers

seeds: [1, 2, 3, 4, 5]

# Labels per class for semi-supervised setting.
# 5 per class forces VanillaGCN into the regime where it clearly struggles,
# giving RF-GCN's label propagation genuine room to help.
labels_per_class: 5

training:
  epochs: 400
  num_layers: 2          # GCN depth
  hidden_dim: 64
  dropout: 0.5
  lr: 0.01
  weight_decay: 0.0005

rf:
  min_hop: 1             # include immediate neighbors (highest homophily)
  max_hop: 3             # extend beyond 2-layer GCN's natural reach
  alpha: 0.7             # distance decay: weight = alpha^hop * source_homophily
  pairs_per_source: 16   # pairs per source per hop
  pair_graph: undirected
  rampup_epochs: 0       # RF active from epoch 1 — needed when labels are scarce

variants:
  - name: VanillaGCN
    method: vanilla

  - name: RF-GCN-LCE-050
    method: rf_gcn
    loss_type: label_ce
    lambda_rf: 0.5

  - name: RF-GCN-LCE-100
    method: rf_gcn
    loss_type: label_ce
    lambda_rf: 1.0

  - name: RF-GCN-LCE-200
    method: rf_gcn
    loss_type: label_ce
    lambda_rf: 2.0

  - name: RF-GCN-SKL-100
    method: rf_gcn
    loss_type: symmetric_kl
    lambda_rf: 1.0
